<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="PREFIN">
  <defs>
    <linearGradient id="pfg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A5B4FC"/>
      <stop offset="0.5" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
  <!-- Badge brillante con aro claro: separa el logo del navy de la navbar -->
  <rect x="3" y="3" width="58" height="58" rx="16" fill="url(#pfg)"
        stroke="#E0E7FF" stroke-width="2"/>
  <!-- Monograma P (trazo y bucle) en blanco -->
  <path d="M19 15 h7 v34 h-7 z" fill="#FFFFFF"/>
  <path d="M26 15 h7 a10 10 0 0 1 0 20 h-7 z" fill="#FFFFFF"/>
  <!-- Línea de tendencia ascendente (predicción / crecimiento) -->
